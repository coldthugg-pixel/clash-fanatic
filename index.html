<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Fanatic PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<header class="header">
    <div class="header-top">
        <span>←</span>
        <h1>CLASH FANATIC</h1>
        <span>☰</span>
    </div>
</header>

<div class="filters-wrapper">
    <div class="filters">
        <button class="filter-btn active">🌾 ФАРМИНГ</button>
        <button class="filter-btn">🏆 РЕЙТИНГ</button>
        <button class="filter-btn">⚔ КЛАН</button>
    </div>
</div>

<div class="base-list" id="baseList"></div>

<nav class="bottom-nav">
    <button class="nav-item active">
        <div>📋</div>
        <span>Copy Bases</span>
    </button>
    <button class="nav-item">
        <div>⚔️</div>
        <span>Armies</span>
    </button>
    <button class="nav-item">
        <div>⭐</div>
        <span>Tips</span>
    </button>
    <button class="nav-item">
        <div>🕒</div>
        <span>Last Seen</span>
    </button>
    <button class="nav-item">
        <div>📖</div>
        <span>Terms</span>
    </button>
</nav>

</div>

<script src="script.js"></script>
</body>
</html>
